{
  "version": "2.0",
  "goal": "minimize_cloud_with_quality_guardrails",
  "quality_budget_pp": 5,
  "disk": {
    "target_expansion_gb": 40,
    "min_free_gb": 20,
    "models_root": "D:\\Ollama\\models"
  },
  "runtime": {
    "OLLAMA_KEEP_ALIVE": "30m",
    "OLLAMA_MAX_LOADED_MODELS": 2,
    "OLLAMA_NUM_PARALLEL": 1,
    "OLLAMA_CONTEXT_LENGTH": 4096,
    "reviewer_num_ctx": 3072
  },
  "cloud_budget": {
    "max_cloud_calls_per_task": 1
  },
  "routing": {
    "default": {
      "layout": "LOCAL_FIRST",
      "ui_logic": "CLOUD_ONLY",
      "refactor": "CLOUD_ONLY",
      "bugfix": "CONDITIONAL_SIMPLE_LOCAL"
    },
    "bugfix_simple": {
      "max_files_touched": 2,
      "allowed_risk": ["low"],
      "mode": "LOCAL_FIRST",
      "fallback_mode": "CLOUD_ONLY"
    },
    "experimental_local_types": ["ui_logic", "refactor", "bugfix_complex"]
  },
  "models": {
    "baseline": [
      "qwen2.5-coder:7b",
      "qwen2.5-coder:7b-instruct-q6_K",
      "deepseek-r1:8b",
      "qwen3:8b",
      "bge-m3"
    ],
    "candidates": [
      "qwen2.5-coder:7b-instruct-q8_0",
      "granite-code:8b-instruct",
      "starcoder2:15b-instruct-v0.1-q3_K_M"
    ],
    "cold_standby": [
      "qwen2.5-coder:14b"
    ],
    "registry": {
      "fast_local": {
        "model": "qwen2.5-coder:7b",
        "role": "code_fast_pass",
        "num_ctx": 4096,
        "timeout_sec": 30,
        "priority": 1
      },
      "strong_local": {
        "model": "qwen2.5-coder:7b-instruct-q6_K",
        "role": "code_strong_pass",
        "num_ctx": 4096,
        "timeout_sec": 60,
        "priority": 2
      },
      "reviewer": {
        "model": "deepseek-r1:8b",
        "role": "reviewer",
        "num_ctx": 3072,
        "timeout_sec": 45,
        "priority": 3
      }
    }
  },
  "bench": {
    "min_tasks": 24,
    "required_counts": {
      "layout": 6,
      "ui_logic": 8,
      "bugfix": 5,
      "refactor": 5
    }
  },
  "acceptance": {
    "cloud_calls_reduction_min": 0.40,
    "success_rate_drop_max_pp": 5,
    "defects_delta_max": 0.3,
    "local_accept_layout_simple_bugfix_min": 0.80
  },
  "smoke": {
    "ready_models": [
      {
        "model": "qwen2.5-coder:7b",
        "probe": "Reply exactly: READY"
      },
      {
        "model": "qwen2.5-coder:7b-instruct-q8_0",
        "probe": "Reply exactly: READY_Q8"
      }
    ],
    "serve_task": "OllamaServeAtLogon",
    "watchdog_task": "OllamaWatchdog10m",
    "watchdog_log": "ops\\watchdog_ollama.log"
  }
}
